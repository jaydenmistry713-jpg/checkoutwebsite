<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KOVA Admin — Sign In</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;0,800;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }

    :root {
      --bg:           #F7F6FF;
      --surface:      #FFFFFF;
      --surface-2:    #F0EDFF;
      --border:       #E0DAFF;
      --border-light: #ECEAFF;
      --primary:      #7C3AED;
      --primary-hover:#6D28D9;
      --primary-soft: #EDE9FE;
      --text:         #1E1B4B;
      --text-2:       #5B4F99;
      --text-muted:   #9B8FCC;
    }

    body {
      background-color: var(--bg);
      background-image:
        radial-gradient(ellipse at 15% 30%, rgba(124,58,237,0.08) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 75%, rgba(244,63,94,0.05) 0%, transparent 45%);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-wrap {
      width: 100%;
      max-width: 400px;
      animation: fadeUp 0.45s ease both;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

    .logo-area {
      text-align: center;
      margin-bottom: 28px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(124,58,237,0.1);
    }
    .card-top {
      padding: 26px 28px 22px;
      border-bottom: 1px solid var(--border-light);
      background: linear-gradient(135deg, var(--primary-soft) 0%, #FDF2F8 100%);
    }
    .card-body { padding: 28px 28px 30px; }

    .form-group { margin-bottom: 18px; }
    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 7px;
    }
    .form-input {
      width: 100%;
      background: var(--surface-2);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 400;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(124,58,237,0.1);
      background: var(--surface);
    }
    .form-input::placeholder { color: var(--text-muted); }

    .btn-submit {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: white;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      font-weight: 700;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 6px;
    }
    .btn-submit:hover { background: var(--primary-hover); transform: scale(1.02); }
    .btn-submit:disabled { background: var(--border); color: var(--text-muted); cursor: not-allowed; transform: none; }

    .error-banner {
      background: rgba(244,63,94,0.07);
      border: 1.5px solid rgba(244,63,94,0.2);
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 13px;
      color: #DC2626;
      margin-bottom: 18px;
      display: none;
    }
  </style>
</head>
<body>

  <div class="login-wrap">

    <div class="logo-area">
      <a href="/" style="font-family:'Poppins',sans-serif;font-size:28px;font-weight:800;letter-spacing:0.06em;color:var(--primary);text-decoration:none;display:inline-block;margin-bottom:6px;">KOVA</a>
      <div style="font-size:12px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-muted);">Admin Portal</div>
    </div>

    <div class="card">
      <div class="card-top">
        <h1 style="font-family:'Poppins',sans-serif;font-size:22px;font-weight:700;color:var(--text);margin-bottom:5px;">Welcome back 👋</h1>
        <p style="font-size:13px;color:var(--text-2);">Sign in to manage your events and ticket sales.</p>
      </div>

      <div class="card-body">
        <div id="error-banner" class="error-banner">Incorrect email or password. Please try again.</div>

        <form onsubmit="handleLogin(event)">
          <div class="form-group">
            <label class="form-label" for="email">Email Address</label>
            <input id="email" class="form-input" type="email" placeholder="you@yourdomain.com" required autocomplete="email" />
          </div>
          <div class="form-group" style="margin-bottom:22px;">
            <label class="form-label" for="password">Password</label>
            <input id="password" class="form-input" type="password" placeholder="••••••••••" required autocomplete="current-password" />
          </div>
          <button type="submit" class="btn-submit" id="submit-btn">Sign In</button>
        </form>
      </div>
    </div>

    <p style="text-align:center;margin-top:18px;font-size:13px;color:var(--text-muted);">
      <a href="/" style="color:var(--text-2);font-weight:500;text-decoration:none;transition:color 0.2s;" onmouseover="this.style.color='var(--primary)'" onmouseout="this.style.color='var(--text-2)'">← Back to website</a>
    </p>

  </div>

  <!-- SCRIPTS -->
  <script src="/js/config.js"></script>
  <script>
    const { createClient } = supabase
    const sb = createClient(window.KOVA_CONFIG.SUPABASE_URL, window.KOVA_CONFIG.SUPABASE_ANON_KEY)

    sb.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = '/admin/index.html'
    })

    async function handleLogin(e) {
      e.preventDefault()
      const btn = document.getElementById('submit-btn')
      const err = document.getElementById('error-banner')
      btn.disabled = true
      btn.textContent = 'Signing in…'
      err.style.display = 'none'

      const { error } = await sb.auth.signInWithPassword({
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
      })

      if (error) {
        err.style.display = 'block'
        btn.disabled = false
        btn.textContent = 'Sign In'
        return
      }
      window.location.href = '/admin/index.html'
    }
  </script>
</body>
</html>
