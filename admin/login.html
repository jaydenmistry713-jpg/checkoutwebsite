<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KOVA Admin — Sign In</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }

    :root {
      --bg:         #FDFAF6;
      --surface:    #FFFFFF;
      --surface-2:  #F7F2EA;
      --border:     #E6DFD5;
      --border-light:#EDE8E1;
      --accent:     #9A7B30;
      --accent-bg:  #C8A96E;
      --text:       #1A1612;
      --text-2:     #6B6156;
      --text-muted: #A8A098;
    }

    body {
      background-color: var(--bg);
      background-image:
        radial-gradient(ellipse at 20% 60%, rgba(200,169,110,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(200,169,110,0.06) 0%, transparent 45%);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-wrap {
      width: 100%;
      max-width: 380px;
    }

    .logo-area {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 30px;
      letter-spacing: 0.32em;
      color: var(--accent);
      font-weight: 300;
      text-decoration: none;
      display: inline-block;
      margin-bottom: 4px;
    }
    .logo-sub {
      font-size: 10px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(26,22,18,0.08);
    }
    .card-top {
      padding: 24px 28px 20px;
      border-bottom: 1px solid var(--border-light);
      background: var(--surface-2);
    }
    .card-body {
      padding: 26px 28px 28px;
    }

    .form-group { margin-bottom: 18px; }
    .form-label {
      display: block;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .form-input {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 14px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 300;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-input:focus {
      border-color: var(--accent-bg);
      box-shadow: 0 0 0 3px rgba(200,169,110,0.12);
      background: var(--surface);
    }
    .form-input::placeholder { color: var(--text-muted); }

    .btn-submit {
      width: 100%;
      padding: 14px;
      background: var(--text);
      color: var(--surface);
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 6px;
    }
    .btn-submit:hover { background: var(--accent); }
    .btn-submit:disabled { background: var(--border); color: var(--text-muted); cursor: not-allowed; }

    .error-banner {
      background: rgba(200,60,60,0.07);
      border: 1px solid rgba(200,60,60,0.2);
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 13px;
      color: #B83030;
      margin-bottom: 18px;
      display: none;
    }

    @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
    .login-wrap { animation: fadeUp 0.45s ease both; }
  </style>
</head>
<body>

  <div class="login-wrap">

    <!-- Logo -->
    <div class="logo-area">
      <a href="/" class="logo">KOVA</a>
      <div class="logo-sub">Admin Portal</div>
    </div>

    <!-- Card -->
    <div class="card">
      <div class="card-top">
        <h1 style="font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:300;color:var(--text);margin-bottom:4px;">Welcome back</h1>
        <p style="font-size:13px;color:var(--text-2);font-weight:300;">Sign in to manage your events and ticket sales.</p>
      </div>

      <div class="card-body">
        <div id="error-banner" class="error-banner">Incorrect email or password. Please try again.</div>

        <form onsubmit="handleLogin(event)">
          <div class="form-group">
            <label class="form-label" for="email">Email Address</label>
            <input id="email" class="form-input" type="email" placeholder="you@yourdomain.com" required autocomplete="email" />
          </div>
          <div class="form-group" style="margin-bottom:22px;">
            <label class="form-label" for="password">Password</label>
            <input id="password" class="form-input" type="password" placeholder="••••••••••" required autocomplete="current-password" />
          </div>
          <button type="submit" class="btn-submit" id="submit-btn">Sign In</button>
        </form>
      </div>
    </div>

    <p style="text-align:center;margin-top:18px;font-size:12px;color:var(--text-muted);">
      <a href="/" style="color:var(--text-2);text-decoration:none;transition:color 0.2s;" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text-2)'">← Back to website</a>
    </p>

  </div>

  <!-- ── SCRIPTS ── -->
  <script src="/js/config.js"></script>
  <script>
    const { createClient } = supabase
    const sb = createClient(window.KOVA_CONFIG.SUPABASE_URL, window.KOVA_CONFIG.SUPABASE_ANON_KEY)

    sb.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = '/admin/index.html'
    })

    async function handleLogin(e) {
      e.preventDefault()
      const btn = document.getElementById('submit-btn')
      const err = document.getElementById('error-banner')
      btn.disabled = true
      btn.textContent = 'Signing in…'
      err.style.display = 'none'

      const { error } = await sb.auth.signInWithPassword({
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
      })

      if (error) {
        err.style.display = 'block'
        btn.disabled = false
        btn.textContent = 'Sign In'
        return
      }
      window.location.href = '/admin/index.html'
    }
  </script>
</body>
</html>
